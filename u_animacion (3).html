<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Personaje U - Animación</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #000;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        overflow: hidden;
      }

      .scene {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 400px;
        height: 400px;
      }

      .character-wrap {
        position: relative;
        width: 320px;
        height: 320px;
        transform-origin: center bottom;
        animation: fullSequence 7s ease-in-out infinite;
      }

      .character-wrap img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }

      /*
      Secuencia 7s:
      0–20%  : Giro 3D de derecha a izquierda
      20–52% : Inclinación derecha ↔ izquierda (2 veces)
      55–85% : Saludo — inclinado a la derecha + shake vertical
      85–100%: Regreso al inicio
    */
      @keyframes fullSequence {
        /* GIRO */
        0% {
          transform: perspective(600px) rotateY(0deg) rotate(0deg)
            translateY(0px);
        }
        5% {
          transform: perspective(600px) rotateY(-90deg) rotate(0deg)
            translateY(0px);
        }
        10% {
          transform: perspective(600px) rotateY(-180deg) rotate(0deg)
            translateY(0px);
        }
        15% {
          transform: perspective(600px) rotateY(-270deg) rotate(0deg)
            translateY(0px);
        }
        20% {
          transform: perspective(600px) rotateY(-360deg) rotate(0deg)
            translateY(0px);
        }

        /* INCLINACIÓN */
        28% {
          transform: perspective(600px) rotateY(0deg) rotate(16deg)
            translateY(0px);
        }
        36% {
          transform: perspective(600px) rotateY(0deg) rotate(-16deg)
            translateY(0px);
        }
        44% {
          transform: perspective(600px) rotateY(0deg) rotate(16deg)
            translateY(0px);
        }
        52% {
          transform: perspective(600px) rotateY(0deg) rotate(0deg)
            translateY(0px);
        }

        /* SALUDO */
        55% {
          transform: perspective(600px) rotateY(0deg) rotate(16deg)
            translateY(0px);
        }
        59% {
          transform: perspective(600px) rotateY(0deg) rotate(16deg)
            translateY(-10px);
        }
        63% {
          transform: perspective(600px) rotateY(0deg) rotate(16deg)
            translateY(2px);
        }
        67% {
          transform: perspective(600px) rotateY(0deg) rotate(16deg)
            translateY(-10px);
        }
        71% {
          transform: perspective(600px) rotateY(0deg) rotate(16deg)
            translateY(2px);
        }
        75% {
          transform: perspective(600px) rotateY(0deg) rotate(16deg)
            translateY(-10px);
        }
        79% {
          transform: perspective(600px) rotateY(0deg) rotate(16deg)
            translateY(2px);
        }
        85% {
          transform: perspective(600px) rotateY(0deg) rotate(0deg)
            translateY(0px);
        }

        /* PAUSA y reinicio */
        100% {
          transform: perspective(600px) rotateY(0deg) rotate(0deg)
            translateY(0px);
        }
      }
    </style>
  </head>
  <body>
    <div class="scene">
      <div class="character-wrap">
        <img src="assets/uni.jpeg" alt="Personaje U animado" />
      </div>
    </div>
  </body>
</html>
